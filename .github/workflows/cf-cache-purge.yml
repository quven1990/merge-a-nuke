name: Purge Cloudflare cache after Pages deploy

on:
  check_suite:
    types: [completed]
  workflow_dispatch:

concurrency:
  group: cf-cache-purge
  cancel-in-progress: false

permissions:
  checks: read

jobs:
  purge:
    if: github.event_name == 'workflow_dispatch' || github.event.check_suite.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Verify Cloudflare Pages production check
        id: verify
        if: github.event_name != 'workflow_dispatch'
        uses: actions/github-script@v7
        with:
          script: |
            const suite = context.payload.check_suite

            if (suite.head_branch !== 'main') {
              core.info(`Skipping purge: branch is ${suite.head_branch}, not main.`)
              core.setOutput('should_purge', 'false')
              return
            }

            const { data } = await github.rest.checks.listForSuite({
              owner: context.repo.owner,
              repo: context.repo.repo,
              check_suite_id: suite.id,
            })

            const pagesCheck = data.check_runs.find((run) =>
              run.name.toLowerCase().includes('cloudflare pages') &&
              run.conclusion === 'success'
            )

            if (!pagesCheck) {
              core.info('No successful Cloudflare Pages check in this suite.')
              core.setOutput('should_purge', 'false')
              return
            }

            core.info(`Matched Pages check: ${pagesCheck.name}`)
            core.setOutput('should_purge', 'true')

      - name: Purge entire zone cache
        if: github.event_name == 'workflow_dispatch' || steps.verify.outputs.should_purge == 'true'
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "$CF_API_TOKEN" ] || [ -z "$CF_ZONE_ID" ]; then
            echo "::error::CF_API_TOKEN or CF_ZONE_ID is not set in repository secrets."
            exit 1
          fi

          http_code=$(curl -sS -o /tmp/cf-purge-response.json -w "%{http_code}" -X POST \
            "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')

          echo "HTTP ${http_code}"
          cat /tmp/cf-purge-response.json
          echo ""

          if [ "$http_code" != "200" ]; then
            echo "::error::Cloudflare purge failed with HTTP ${http_code}. Use a Purge Cache API token scoped to mergeanuke.site."
            exit 1
          fi

          grep -q '"success":true' /tmp/cf-purge-response.json || {
            echo "::error::Cloudflare API returned success=false"
            exit 1
          }
          echo "Cache purged successfully."
